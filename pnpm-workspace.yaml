packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: false
  lmdb: true
  msgpackr-extract: true
  msw: true
  nx: true
  sharp: true
  unrs-resolver: true
blockExoticSubdeps: true
catalogs:
  angular:
    "@analogjs/storybook-angular": "~2.5.0"
    "@analogjs/vite-plugin-angular": "~2.5.0"
    "@analogjs/vitest-angular": "~2.5.0"
    '@angular-devkit/build-angular': '21.2.7'
    '@angular-eslint/builder': '^21.1.0'
    '@angular-eslint/bundled-angular-compiler': '^21.1.0'
    '@angular-eslint/eslint-plugin': '^21.1.0'
    '@angular-eslint/eslint-plugin-template': '^21.1.0'
    '@angular-eslint/schematics': '^21.1.0'
    '@angular-eslint/template-parser': '21.1.0'
    '@angular/animations': '21.2.7'
    '@angular/build': '21.2.7'
    '@angular/common': '21.2.7'
    '@angular/compiler': '21.2.7'
    '@angular/compiler-cli': '21.2.7'
    '@angular/core': '21.2.7'
    '@angular/platform-browser': '21.2.7'
    '@angular/platform-server': '21.2.9'
    '@angular/router': '21.2.7'
    '@ng-icons/core': '^32.5.0'
    '@ng-icons/phosphor-icons': '^33.0.0'
    '@schematics/angular': '21.2.7'
    angular-eslint: '21.0.0'
    ng-packagr: '21.0.1'
    zone.js: '^0.16.1'
  angular-supported-versions:
    '@angular/common': '>= 21.0.0 < 22.0.0'
    '@angular/core': '>= 21.0.0 < 22.0.0'
  designsystemet:
    '@digdir/designsystemet': '1.14.0'
    '@digdir/designsystemet-css': '1.14.0'
    '@digdir/designsystemet-react': '1.14.0'
    '@digdir/designsystemet-web': '1.14.0'
    '@navikt/aksel-icons': '8.10.3'
  lit:
    '@lit-labs/signals': '^0.1.3'
    lit: '^3.3.0'
  nx:
    '@nx/angular': '22.6.5'
    '@nx/devkit': '22.6.5'
    '@nx/eslint': '22.6.5'
    '@nx/eslint-plugin': '22.6.5'
    '@nx/js': '22.6.5'
    '@nx/playwright': '22.6.5'
    '@nx/react': '22.6.5'
    '@nx/storybook': '22.6.5'
    '@nx/vite': '22.6.5'
    '@nx/vitest': '22.6.5'
    '@nx/web': '22.6.5'
    nx: '22.6.5'
  open-wc:
    '@open-wc/testing': '^4.0.0'
  react:
    '@types/react': '19.2.14'
    '@types/react-dom': '19.2.3'
    react: '19.2.4'
    react-dom: '19.2.4'
  react-supported-versions:
    react: '>=18.3.1'
    react-dom: '>=18.3.1'
  storybook:
    '@storybook/addon-docs': '10.2.17'
    '@storybook/angular': '10.2.17'
    '@storybook/html': '10.2.17'
    '@storybook/html-vite': '10.2.17'
    '@storybook/react': '10.2.17'
    '@storybook/react-vite': '10.2.17'
    '@storybook/web-components': '10.2.17'
    '@storybook/web-components-vite': '10.2.17'
    storybook: '10.2.17'
  testing-library:
    '@testing-library/angular': '^17.4.0'
    '@testing-library/dom': '10.4.1'
    '@testing-library/jest-dom': '~6.6.3'
    '@testing-library/react': '^16.3.0'
    '@testing-library/user-event': '^14.6.1'
  typescript:
    '@types/node': '^24.1.0'
    ts-morph: '^27.0.2'
    tslib: '^2.8.1'
    tsx: '4.8.1'
    typescript: '5.9.3'
    vite: '7.1.12'
    vite-plugin-dts: '~4.5.4'
  vitest-a11y:
    vitest-axe: '^0.1.0'
cleanupUnusedCatalogs: true
ignoredBuiltDependencies:
  - 'less'
minimumReleaseAge: 2880
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - 'esbuild'
  - 'lmdb'
  - 'msgpackr-extract'
  - 'msw'
  - 'nx'
  - 'sharp'
  - 'unrs-resolver'
trustPolicy: 'no-downgrade'
trustPolicyExclude:
  - 'chokidar@4.0.3'
  - 'detect-port@1.6.1'
  - 'undici-types@6.21.0'
  - 'semver@6.3.1'
  - 'express-rate-limit@8.3.0'
trustPolicyIgnoreAfter: 10080
verifyDepsBeforeRun: 'prompt'
